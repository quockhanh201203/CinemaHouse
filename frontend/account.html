<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tài khoản</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1d1d1f;
        background: #f7f3ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px clamp(18px, 5vw, 64px);
        border-bottom: 1px solid rgba(38, 29, 21, 0.08);
        background: rgba(247, 243, 236, 0.92);
      }

      a {
        color: #c7192b;
        font-weight: 900;
        text-decoration: none;
      }

      main {
        display: grid;
        grid-template-columns: minmax(0, 520px) minmax(280px, 1fr);
        gap: 22px;
        padding: clamp(26px, 6vw, 72px) clamp(18px, 5vw, 64px);
      }

      .panel {
        border-radius: 8px;
        background: #ffffff;
        padding: 26px;
        box-shadow: 0 18px 36px rgba(36, 28, 22, 0.08);
      }

      h1,
      h2 {
        margin: 0;
        color: #171210;
        letter-spacing: 0;
      }

      h1 {
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1;
      }

      h2 {
        font-size: 22px;
      }

      dl {
        display: grid;
        gap: 14px;
        margin: 24px 0 0;
      }

      dt {
        color: #7a6c5f;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      dd {
        margin: 4px 0 0;
        color: #241c17;
        font-size: 18px;
        font-weight: 800;
      }

      .empty {
        margin-top: 18px;
        padding: 20px;
        border: 1px dashed #d9cbbb;
        border-radius: 8px;
        color: #6c5c4e;
        background: #fffaf3;
      }

      .logout-button {
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        background: #1f1a17;
        color: #ffffff;
        cursor: pointer;
        font-weight: 800;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="/homepage.html">Cinema House</a>
      <button class="logout-button" id="logoutButton" type="button">Đăng xuất</button>
    </header>

    <main>
      <section class="panel">
        <h1>Tài khoản</h1>
        <dl id="profile">
          <div class="empty">Đang tải thông tin tài khoản...</div>
        </dl>
      </section>

      <section class="panel">
        <h2>Lịch sử đặt vé</h2>
        <div class="empty">Bạn chưa có lịch sử đặt vé. Phần này sẽ hiển thị sau khi có phân hệ đặt vé.</div>
      </section>
    </main>

    <script>
      const API_URL = window.API_URL || "http://localhost:5000";
      const profile = document.querySelector("#profile");
      const logoutButton = document.querySelector("#logoutButton");

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDate(dateValue) {
        if (!dateValue) return "--";
        return new Intl.DateTimeFormat("vi-VN").format(new Date(dateValue));
      }

      async function loadProfile() {
        const response = await fetch(`${API_URL}/api/auth/me`, {
          credentials: "include"
        });

        if (!response.ok) {
          window.location.href = "/";
          return;
        }

        const result = await response.json();
        const user = result.data;

        profile.innerHTML = `
          <div>
            <dt>Họ tên</dt>
            <dd>${escapeHtml(user.fullName)}</dd>
          </div>
          <div>
            <dt>Email</dt>
            <dd>${escapeHtml(user.email)}</dd>
          </div>
          <div>
            <dt>Ngày sinh</dt>
            <dd>${escapeHtml(formatDate(user.dateOfBirth))}</dd>
          </div>
          <div>
            <dt>Vai trò</dt>
            <dd>${escapeHtml(user.role)}</dd>
          </div>
        `;
      }

      logoutButton.addEventListener("click", async () => {
        await fetch(`${API_URL}/api/auth/logout`, {
          method: "POST",
          credentials: "include"
        });
        window.location.href = "/";
      });

      loadProfile();
    </script>
  </body>
</html>
